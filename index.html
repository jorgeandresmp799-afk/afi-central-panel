<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL AFI</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        h2 { color: #f0f; text-align: center; }
        h3 { color: #58a6ff; border-bottom: 1px solid #30363d; }
    </style>
</head>
<body>

    <h2>CENTRAL AFI</h2>

    <div class="card">
        <h3>APELACIONES</h3>
        {% for t in tickets %}
            <div>{{ t[2] }}</div>
        {% endfor %}
    </div>

    <div class="card">
        <h3>AGENTES</h3>
        {% for a in agentes %}
            <div>{{ a[0] }}</div>
        {% endfor %}
    </div>

</body>
</html>
