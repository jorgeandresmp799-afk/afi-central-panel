<!DOCTYPE html>
<html><head><title>AFM CENTRAL</title>
<style>
body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
input { background: #000; color: white; border: 1px solid #333; padding: 8px; width: 90%; }
button { background: #238636; color: white; border: none; padding: 10px; cursor: pointer; }
</style>
</head>
<body>
    <h2>CENTRAL AFM</h2>
    <div class="card">
        <h3>APELACIONES</h3>
        {% for t in tickets %}<div>{{t[2]}}</div>{% endfor %}
    </div>
    <div class="card">
        <h3>AGENTES</h3>
        {% for a in agentes %}<div>{{a[0]}}</div>{% endfor %}
    </div>
</body></html>
